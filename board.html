<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소통함 | KIM SEON MIN 포트폴리오</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .board-page-container {
            padding-top: 120px;
            padding-bottom: 80px;
            min-height: 80vh;
        }
        .board-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .board-header h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--text-dark);
            margin-bottom: 15px;
            white-space: nowrap;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .btn-back:hover {
            transform: translateX(-5px);
        }
    </style>
</head>
<body>

    <!-- GNB -->
    <nav id="navbar" class="scrolled"> <!-- Board 페이지는 항상 scrolled 상태의 흰색 배경 유지 -->
        <div class="container">
            <a href="index.html" class="logo">KIM SEON MIN</a>
            <input type="checkbox" id="nav-toggle" class="nav-toggle">
            <label for="nav-toggle" class="nav-toggle-label">
                <span></span>
            </label>
            <ul class="nav-links">
                <li><a href="index.html#about">About Me</a></li>
                <li><a href="index.html#skills">Skills</a></li>
                <li><a href="index.html#roadmap">Roadmap</a></li>
                <li><a href="index.html#projects">Projects</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="board.html" class="active">Board</a></li>
            </ul>
        </div>
    </nav>

    <main class="board-page-container">
        <div class="container">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> 메인으로 돌아가기</a>
            
            <div class="board-header fade-in">
                <h1>소통함 (Free Board)</h1>
                <p>기록을 남기거나 궁금한 점을 자유롭게 질문해 주세요.</p>
            </div>

            <div class="board-actions-top fade-in" style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                <button type="button" class="btn-write" id="btnShowForm" onclick="toggleBoardForm()">
                    <i class="fas fa-edit"></i> 글쓰기
                </button>
            </div>

            <div id="formContainer" class="form-container fade-in" style="display: none; margin-bottom: 50px;">
                <div class="board-container">
                    <form id="boardForm" class="board-form">
                        <div class="form-header" style="grid-column: span 2; margin-bottom: 10px;">
                            <h3 id="formTitle">새 글 남기기</h3>
                        </div>
                        <input type="text" id="boardName" placeholder="작성자 성함" required>
                        <input type="text" id="boardTitle" placeholder="제목" required>
                        <textarea id="boardContent" placeholder="내용을 입력해주세요." required style="resize: none;"></textarea>
                        
                        <div class="board-options" style="grid-column: span 2; display: flex; flex-wrap: wrap; align-items: center; gap: 20px; margin-top: -10px; background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #f0f0f0;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600;">
                                <input type="checkbox" id="isSecret"> 
                                <i class="fas fa-lock" style="color: #888;"></i> 비밀글로 작성
                            </label>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="font-size: 0.85rem; color: #666; font-weight: 600;">비밀번호:</span>
                                <input type="password" id="boardPassword" placeholder="4자리 이상 (수정/삭제용)" required style="padding: 8px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.85rem; width: 220px;">
                            </div>
                        </div>
                        
                        <div style="grid-column: span 2; display: flex; gap: 10px;">
                            <button type="submit" id="submitBtn" class="btn-primary" style="flex: 2;">글 남기기</button>
                            <button type="button" class="btn-secondary" onclick="toggleBoardForm()" style="flex: 1; background: #eee; color: #666; border: none; border-radius: 10px; cursor: pointer; font-weight: 600;">취소</button>
                        </div>
                        <input type="hidden" id="editId" value="">
                    </form>
                </div>
            </div>

            <div class="board-list-title fade-in" style="margin-bottom: 20px; border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-list-ul" style="color: var(--primary-blue);"></i>
                <h3 style="font-size: clamp(1.1rem, 3vw, 1.3rem); color: var(--text-dark); white-space: nowrap;">등록된 게시글</h3>
            </div>

            <div id="postList" class="post-list">
                <!-- JS에서 게시글이 로드됩니다. -->
            </div>
        </div>
    </main>

    <footer style="padding: 50px 0; background: #f9f9f9; text-align: center; border-top: 1px solid #eee;">
        <div class="container">
            <p>&copy; 2025 KIM SEON MIN. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Firebase App/Firestore Compat SDK (사용자용) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="main.js"></script>
</body>
</html>
